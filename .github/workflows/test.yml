name: test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check version consistency
        run: node scripts/check-versions.js

      - name: Validate plugin JSON
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json; do
            node -e "JSON.parse(require('fs').readFileSync('$f','utf8')); console.log('$f: valid')"
          done

      - name: Check SKILL.md frontmatter
        run: |
          npm install --no-save js-yaml
          node -e "
          const fs = require('fs');
          const yaml = require('js-yaml');
          const content = fs.readFileSync('skills/hiding/SKILL.md', 'utf8');
          if (!content.startsWith('---')) { console.error('Missing frontmatter'); process.exit(1); }
          const end = content.indexOf('\n---', 3);
          if (end === -1) { console.error('Unterminated frontmatter'); process.exit(1); }
          const fm = yaml.load(content.substring(3, end));
          if (!fm || typeof fm !== 'object') { console.error('Frontmatter is not a YAML mapping'); process.exit(1); }
          for (const field of ['name', 'description']) {
            if (typeof fm[field] !== 'string' || !fm[field].trim()) { console.error('Missing or empty ' + field + ' in frontmatter'); process.exit(1); }
          }
          if (!fm.metadata || typeof fm.metadata.version !== 'string') { console.error('Missing metadata.version in frontmatter'); process.exit(1); }
          console.log('SKILL.md frontmatter: valid YAML, name/description/metadata.version present');
          "
