name: publish

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      bootstrap:
        description: 'Publish the first npm release with the NPM_TOKEN secret'
        required: true
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check version consistency
        run: node scripts/check-versions.js
      - name: Install current npm CLI
        run: npm install -g npm@latest
      - name: Require bootstrap confirmation
        if: github.event_name == 'workflow_dispatch' && !inputs.bootstrap
        run: |
          echo 'Enable bootstrap to run the first npm publication.' >&2
          exit 1
      - name: Publish first release with npm token
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo 'NPM_TOKEN is required for the bootstrap publish.' >&2
            exit 1
          fi
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN" --location=user
          npm publish --provenance --access public --registry=https://registry.npmjs.org/
      - name: Publish with npm Trusted Publisher
        if: github.event_name == 'push'
        run: npm publish --provenance --access public --registry=https://registry.npmjs.org/
